<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Math Lab</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F6;--surface:#FFFFFF;--surface-alt:#F0EFED;
  --text:#18181B;--text-2:#71717A;--text-3:#A1A1AA;
  --primary:#166534;--primary-r:22,101,52;--primary-lt:#F0FDF4;--primary-hv:#14532D;
  --danger:#DC2626;--danger-lt:#FEF2F2;
  --warn:#92400E;--warn-lt:#FFFBEB;
  --border:#E4E4E7;--border-strong:#D1D1D6;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.10);
  --ff-d:'DM Serif Display',Georgia,serif;--ff-b:'DM Sans',sans-serif;
  --t:150ms ease;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#0C0C0E;--surface:#161618;--surface-alt:#1E1E21;
  --text:#FAFAFA;--text-2:#A1A1AA;--text-3:#52525B;
  --primary:#22C55E;--primary-r:34,197,94;--primary-lt:#052E16;--primary-hv:#16A34A;
  --danger:#F87171;--danger-lt:#1C0A0A;
  --warn:#FCD34D;--warn-lt:#1C1500;
  --border:#27272A;--border-strong:#3F3F46;
}
html{-webkit-text-size-adjust:100%;overflow-x:hidden}
body{font-family:var(--ff-b);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
#app{min-height:100dvh}
.loading-screen{min-height:100dvh;min-height:100svh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-wrap{min-height:100dvh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--sat)+56px) 20px calc(var(--sab)+32px)}
.brand{text-align:center;margin-bottom:28px}
.brand-mark{width:52px;height:52px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:24px;color:#fff;margin-bottom:12px}
.brand h1{font-family:var(--ff-d);font-size:26px;margin-bottom:2px}
.brand p{font-size:13px;color:var(--text-2)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
@media(min-width:480px){.auth-card{padding:32px 28px}}
.card-heading{font-family:var(--ff-d);font-size:20px;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text-2);margin-bottom:22px}
.steps{display:flex;gap:6px;margin-bottom:20px}
.step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background var(--t)}
.step.active{background:var(--primary)}.step.done{background:var(--primary);opacity:.4}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;letter-spacing:.03em}
.field input{width:100%;padding:11px 13px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-xs);font-family:var(--ff-b);font-size:16px;color:var(--text);outline:none;transition:border-color var(--t),box-shadow var(--t);-webkit-appearance:none}
.field input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(var(--primary-r),.1)}
.field input::placeholder{color:var(--text-3)}
.otp-field{letter-spacing:.6em;font-size:24px;font-weight:600;text-align:center}
.btn{display:block;width:100%;padding:12px 16px;border:none;border-radius:var(--radius-xs);font-family:var(--ff-b);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t);text-align:center;touch-action:manipulation;-webkit-appearance:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-hv);transform:scale(.98)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:active{border-color:var(--primary);color:var(--primary)}
.link{background:none;border:none;color:var(--primary);font-family:var(--ff-b);font-size:13px;font-weight:500;cursor:pointer;padding:0}
.auth-cta{margin-top:16px;text-align:center;font-size:13px;color:var(--text-2)}
.alert{border-radius:var(--radius-xs);padding:10px 13px;font-size:13px;margin-bottom:14px;line-height:1.5}
.alert-err{background:var(--danger-lt);color:var(--danger);border:1px solid rgba(220,38,38,.2)}
.alert-ok{background:var(--primary-lt);color:var(--primary);border:1px solid rgba(var(--primary-r),.2)}
.alert-info{background:var(--warn-lt);color:var(--warn);border:1px solid rgba(146,64,14,.2)}
.alert-warn{background:var(--warn-lt);color:var(--warn);border:1px solid rgba(146,64,14,.2)}
.pending-wrap{min-height:100dvh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px calc(var(--sab)+24px);text-align:center}
.pending-icon{width:72px;height:72px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:var(--text-2)}
.pending-wrap h2{font-family:var(--ff-d);font-size:22px;margin-bottom:10px}
.pending-wrap p{font-size:14px;color:var(--text-2);max-width:300px;line-height:1.65;margin-bottom:6px}
.home{min-height:100dvh;min-height:100svh;padding-bottom:calc(var(--sab)+24px)}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--sat)+12px) 16px 0;position:sticky;top:0;z-index:20}
.header-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;min-height:44px}
.app-brand{display:flex;align-items:center;gap:9px}
.app-brand-mark{width:30px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:13px;color:#fff;flex-shrink:0}
.app-brand-name{font-family:var(--ff-d);font-size:16px}
.hbtn{background:none;border:1px solid var(--border);border-radius:var(--radius-xs);width:34px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;padding:0;transition:border-color var(--t)}
.hbtn:active{border-color:var(--primary)}
.hb-bar{width:14px;height:1.5px;background:var(--text-2);border-radius:1px}
.dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);min-width:190px;overflow:hidden;z-index:100;animation:fadeDown .12s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dd-item{display:flex;align-items:center;gap:11px;padding:12px 14px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;border:none;background:none;width:100%;font-family:var(--ff-b);text-align:left;transition:background var(--t);border-bottom:1px solid var(--border)}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:var(--surface-alt)}
.dd-item.dd-danger{color:var(--danger)}
.dd-icon{font-size:14px;width:18px;text-align:center;opacity:.7}
.tab-bar{display:flex;border-top:1px solid var(--border)}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:12px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;transition:all var(--t);white-space:nowrap;touch-action:manipulation;background:none;border-left:none;border-right:none;border-top:none;font-family:var(--ff-b)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
@media(min-width:400px){.tab{font-size:13px;padding:10px 4px}}
.pane{padding:20px 16px;display:none}
.pane.active{display:block}
.greeting-name{font-family:var(--ff-d);font-size:20px;margin-bottom:2px}
.greeting-sub{font-size:13px;color:var(--text-2);margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.s-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.s-val{font-family:var(--ff-d);font-size:28px;color:var(--primary);line-height:1}
.s-val span{font-size:14px;color:var(--text-3)}
.s-note{font-size:11px;color:var(--text-2);margin-top:4px}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.pfill{height:100%;background:var(--primary);border-radius:2px;transition:width .5s ease}
.note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.note-title{font-size:13px;font-weight:600;color:var(--text)}
.note-week{font-size:11px;color:var(--text-3);margin-top:2px;margin-bottom:10px}
.note-body{font-size:14px;color:var(--text-2);line-height:1.7}
.section-head h3{font-family:var(--ff-d);font-size:18px}
.section-sub{font-size:13px;color:var(--text-2);margin-bottom:14px;margin-top:4px}
.class-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.cc-meta{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.cc-topic{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4}
.cc-hw{font-size:13px;color:var(--text-2);margin-bottom:10px;padding:6px 10px;background:var(--surface-alt);border-radius:var(--radius-xs)}
.cc-foot{display:flex;align-items:center;justify-content:space-between}
.cc-foot span{font-size:12px;color:var(--text-3)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-green{background:var(--primary-lt);color:var(--primary)}
.badge-amber{background:var(--warn-lt);color:var(--warn)}
.badge-neutral{background:var(--surface-alt);color:var(--text-2);border:1px solid var(--border)}
.badge-red{background:var(--danger-lt);color:var(--danger)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:380px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:9px 13px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);white-space:nowrap;background:var(--surface-alt)}
td{padding:11px 13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:48px 20px;color:var(--text-3)}
.empty .e-icon{font-size:24px;margin-bottom:10px;opacity:.4}
.empty p{font-size:13px;line-height:1.6}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* Fees */
.fee-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.fee-amount{font-family:var(--ff-d);font-size:36px;color:var(--primary);margin-bottom:4px}
.fee-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:12px}
.fee-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.fee-row:last-child{border-bottom:none}
.fee-row-label{font-size:13px;color:var(--text-2)}
.fee-row-val{font-size:13px;font-weight:600;color:var(--text)}
.pay-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-xs);padding:12px 20px;font-family:var(--ff-b);font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:16px;transition:all var(--t)}
.pay-btn:active{background:var(--primary-hv);transform:scale(.98)}
.history-row{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.history-row:last-child{border-bottom:none}
/* Sheet/overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
@media(min-width:520px){.overlay{align-items:center;padding:20px}}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:100%;max-height:88dvh;overflow-y:auto;animation:sheetUp .2s ease;padding:20px 20px calc(var(--sab)+20px)}
@media(min-width:520px){.sheet{border-radius:var(--radius);max-width:420px;padding:24px;animation:fadeDown .15s ease}}
.sheet-handle{width:36px;height:3px;background:var(--border-strong);border-radius:2px;margin:0 auto 18px}
@media(min-width:520px){.sheet-handle{display:none}}
.sheet h3{font-family:var(--ff-d);font-size:19px;margin-bottom:14px}
.sheet-actions{display:flex;gap:8px;margin-top:16px}
.sheet-actions .btn{flex:1}
@keyframes sheetUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
/* QR modal */
.qr-modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:100%;padding:24px 24px calc(var(--sab)+24px);text-align:center;animation:sheetUp .2s ease;position:relative}
@media(min-width:520px){.qr-modal{border-radius:var(--radius);max-width:380px;padding:28px;animation:fadeDown .15s ease}}
.qr-close{position:absolute;top:16px;right:16px;background:var(--surface-alt);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text-2)}
.qr-title{font-family:var(--ff-d);font-size:20px;margin-bottom:4px}
.qr-sub{font-size:13px;color:var(--text-2);margin-bottom:20px}
#qr-container{display:flex;justify-content:center;margin-bottom:16px}
#qr-container canvas,#qr-container img{border-radius:8px}
.qr-upi{font-size:13px;color:var(--text-2);margin-bottom:4px}
.qr-amount{font-family:var(--ff-d);font-size:24px;color:var(--primary);margin-bottom:20px}
.done-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-xs);padding:13px 20px;font-family:var(--ff-b);font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:10px;transition:all var(--t)}
.done-btn:active{background:var(--primary-hv)}
/* Install */
.device-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.dtab{flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;transition:all var(--t);background:none;border-left:none;border-right:none;border-top:none;font-family:var(--ff-b)}
.dtab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.install-step{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.install-step:last-of-type{border-bottom:none}
.step-num{width:22px;height:22px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text);line-height:1.55}
.step-text strong{color:var(--primary)}
.install-note{background:var(--warn-lt);border-radius:var(--radius-xs);padding:9px 12px;font-size:12px;color:var(--warn);margin-top:12px;line-height:1.5}
.fab-wrap{position:fixed;top:calc(var(--sat)+12px);right:14px;z-index:50;display:flex;gap:7px}
.fab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);transition:all var(--t)}
.fab:active{transform:scale(.95)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease forwards}
</style>
</head>
<body>
<div class="fab-wrap" id="fab-wrap">
  <button class="fab" onclick="showInstall()">Add to Phone</button>
  <button class="fab" onclick="toggleTheme()" id="theme-fab">Dark</button>
</div>
<div id="app"></div>
<script>
const firebaseConfig={apiKey:"AIzaSyD-8CjgBhhg7idQ67TnoxAZJWodYzsukCw",authDomain:"mathlab-d5d4c.firebaseapp.com",databaseURL:"https://mathlab-d5d4c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"mathlab-d5d4c",storageBucket:"mathlab-d5d4c.firebasestorage.app",messagingSenderId:"506143764338",appId:"1:506143764338:web:197451c10bf8972f53f7eb"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();
emailjs.init('fzItBxRq2t5IcS_hg');

const S={screen:'loading',tab:'overview',sd:{},otp:'',err:'',ok:'',itab:'ios',uid:null,user:null,classes:[],note:null,fees:{}};
let isCreatingAccount=false; // prevents onAuthStateChanged from running during signup

let theme=localStorage.getItem('ml_theme')||'light';
document.documentElement.setAttribute('data-theme',theme);
function toggleTheme(){theme=theme==='light'?'dark':'light';localStorage.setItem('ml_theme',theme);document.documentElement.setAttribute('data-theme',theme);const f=$('theme-fab');if(f)f.textContent=theme==='dark'?'Light':'Dark';if(S.screen==='home')render();}

const $=id=>document.getElementById(id);
const fmt=d=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const fmtMoney=n=>`₹${Number(n).toLocaleString('en-IN')}`;
function currentYM(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function ymLabel(ym){const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleString('en-IN',{month:'long',year:'numeric'});}
function dueDate(ym){const[y,m]=ym.split('-');return `2 ${new Date(y,m-1).toLocaleString('en-IN',{month:'long'})} ${y}`;}

// ── AUTH ──────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async fbUser=>{
  if(isCreatingAccount) return; // skip during signup — DB not written yet
  if(fbUser){
    try{
      const snap=await db.ref('users/'+fbUser.uid).once('value');
      const user=snap.val();
      if(user){
        S.uid=fbUser.uid;
        S.user={...user,id:fbUser.uid};
        try{await loadData();}catch(e){console.warn('loadData:',e);}
        try{await checkMonthlySetup();}catch(e){console.warn('checkMonthly:',e);} // never block login
        user.status==='approved'?nav('home'):nav('pending');
      }else{
        // Auth user exists but no DB record — ask them to sign up again
        S.err='Account not found. Please create an account.';
        await auth.signOut();
        nav('login');
      }
    }catch(e){
      console.error('onAuthStateChanged error:',e);
      S.err='Could not connect. Please check your internet and try again.';
      nav('login');
      // Do NOT sign out — let them retry without losing their session
    }
  }else{
    nav('login');
  }
});

async function loadData(){
  if(!S.uid)return;
  const[cSnap,nSnap,uSnap,fSnap]=await Promise.all([
    db.ref('classes').orderByChild('userId').equalTo(S.uid).once('value'),
    db.ref('notes/'+S.uid).once('value'),
    db.ref('users/'+S.uid).once('value'),
    db.ref('fees/'+S.uid).once('value')
  ]);
  S.classes=[];cSnap.forEach(c=>S.classes.push({...c.val(),id:c.key}));
  S.note=nSnap.val();
  S.user={...uSnap.val(),id:S.uid};
  S.fees=fSnap.val()||{};
}

async function checkMonthlySetup(){
  if(!S.uid||!S.user||S.user.status!=='approved')return;
  const ym=currentYM();
  // Ensure fee record exists for this month
  const fSnap=await db.ref(`fees/${S.uid}/${ym}`).once('value');
  if(!fSnap.exists()){
    await db.ref(`fees/${S.uid}/${ym}`).set({amount:S.user.monthlyFee||0,status:'unpaid',paidAt:null,markedByParent:false,reminderSent:false});
  }
  // Send reminder email on 1st of month
  const now=new Date();
  if(now.getDate()===1){
    const reminderSnap=await db.ref(`fees/${S.uid}/${ym}/reminderSent`).once('value');
    if(!reminderSnap.val()){
      try{
        await emailjs.send('service_1x75rs9','template_6o9nzkj',{
          to_name:S.user.name,
          to_email:S.user.email,
          otp:`Hi ${S.user.name}, your Math Lab tuition fee of ${fmtMoney(S.user.monthlyFee||0)} is due tomorrow (2nd ${now.toLocaleString('en-IN',{month:'long'})}). Please make the payment on time. — Ansh, Math Lab`
        });
        await db.ref(`fees/${S.uid}/${ym}/reminderSent`).set(true);
      }catch(e){console.warn('Reminder email failed',e);}
    }
  }
}

async function doLogin(){
  const name=$('ln').value.trim(),pw=$('lp').value.trim();
  if(!name||!pw){S.err='Please fill in all fields.';render();return;}
  const btn=$('login-btn');btn.textContent='Signing in…';btn.disabled=true;
  try{
    const snap=await db.ref('users').orderByChild('nameLower').equalTo(name.toLowerCase()).once('value');
    if(!snap.exists()){S.err='Invalid name or password.';render();return;}
    let email=null;snap.forEach(c=>{email=c.val().email;});
    await auth.signInWithEmailAndPassword(email,pw);
  }catch(e){
    S.err=(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'||e.code==='auth/user-not-found')?'Invalid name or password.':'Sign in failed. Please try again.';render();
  }
}

async function doS1(){

  const otp=Math.floor(100000+Math.random()*900000).toString();

async function doS3(){
  const pw=$('s3p').value,c=$('s3c').value;
  if(!pw||!c){S.err='Please fill in both fields.';render();return;}
  if(pw.length<6){S.err='Password must be at least 6 characters.';render();return;}
  if(pw!==c){S.err='Passwords do not match.';render();return;}
  const btn=$('s3btn');btn.textContent='Creating…';btn.disabled=true;
  isCreatingAccount=true; // block onAuthStateChanged during this process
  try{
    const cred=await auth.createUserWithEmailAndPassword(S.sd.email,pw);
    const uid=cred.user.uid;
    const userData={name:S.sd.name,nameLower:S.sd.name.toLowerCase(),email:S.sd.email,phone:S.sd.phone,studentName:S.sd.studentName,status:'pending',totalClassesMonth:0,monthlyFee:0,syllabusSchedule:[],syllabusTopics:[],createdAt:new Date().toISOString()};
    await db.ref('users/'+uid).set(userData);
    isCreatingAccount=false; // allow onAuthStateChanged now
    S.uid=uid;
    S.user={...userData,id:uid};
    // send admin notification (don't block on this)
    emailjs.send('service_1x75rs9','template_8imnvrh',{parent_name:S.sd.name,student_name:S.sd.studentName,phone:S.sd.phone,parent_email:S.sd.email,signup_time:new Date().toLocaleString('en-IN')}).catch(()=>{});

    S.err=e.code==='auth/email-already-in-use'?'This email is already registered. Please sign in.':'Account creation failed. Please try again.';
    render();
  }
}

// ── FEES PANE ─────────────────────────────────────────────────────────
function rFeePane(u){
  const ym=currentYM();
  const now=new Date();
  const f=S.fees[ym]||{amount:u.monthlyFee||0,status:'unpaid'};
  const status=f.status||'unpaid';
  const isOverdue=status==='unpaid'&&now.getDate()>2;
  const isDueSoon=status==='unpaid'&&now.getDate()<=2;
  const isDueTomorrow=status==='unpaid'&&now.getDate()===1;

  // Check 2nd-to-last day of month: show next month reminder
  const lastDay=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const showNextReminder=status==='paid'&&now.getDate()>=lastDay-1;
  const nextYM=`${now.getMonth()===11?now.getFullYear()+1:now.getFullYear()}-${String((now.getMonth()+2)>12?1:now.getMonth()+2).padStart(2,'0')}`;

  // Build history (last 3 months)
  const history=[];
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const rec=S.fees[k];history.push({ym:k,label:d.toLocaleString('en-IN',{month:'long',year:'numeric'}),status:rec?rec.status:'unpaid',amount:rec?rec.amount:u.monthlyFee||0,paidAt:rec?rec.paidAt:null});}

  return`<div class="pane ${S.tab==='fees'?'active':''}">
  <div class="section-head"><h3>Fees</h3></div>
  <div class="section-sub">${ymLabel(ym)}</div>

  ${isDueTomorrow?`<div class="alert alert-warn" style="margin-bottom:16px">Your tuition fee is due tomorrow (2nd). Please make the payment on time.</div>`:''}
  ${isOverdue?`<div class="alert alert-err" style="margin-bottom:16px">Your tuition fee for ${ymLabel(ym)} is overdue. Please pay as soon as possible.</div>`:''}
  ${showNextReminder?`<div class="alert alert-info" style="margin-bottom:16px">Next month's fee will be due on ${dueDate(nextYM)}.</div>`:''}

  <div class="fee-card">
    <div class="fee-label">Monthly fee</div>
    <div class="fee-amount">${fmtMoney(f.amount||u.monthlyFee||0)}</div>
    <div class="fee-row"><span class="fee-row-label">Due date</span><span class="fee-row-val">2nd of every month</span></div>
    <div class="fee-row"><span class="fee-row-label">This month</span>
      <span class="badge ${status==='paid'?'badge-green':isOverdue?'badge-red':isDueSoon?'badge-amber':'badge-neutral'}" style="font-size:12px;padding:3px 10px">
        ${status==='paid'?'Paid':isOverdue?'Overdue':isDueTomorrow?'Due tomorrow':'Unpaid'}
      </span>
    </div>
    ${status==='paid'&&f.paidAt?`<div class="fee-row"><span class="fee-row-label">Paid on</span><span class="fee-row-val">${fmt(f.paidAt)}</span></div>`:''}
    ${status!=='paid'?`<button class="pay-btn" onclick="showPayModal()">Pay Now</button>`:`<div style="text-align:center;font-size:13px;color:var(--text-2);margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">Payment received. Thank you!</div>`}
  </div>

  <div class="section-head" style="margin-top:8px"><h3>Payment history</h3></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px;margin-top:12px">
    ${history.map(h=>`<div class="history-row">
      <div><div style="font-size:13px;font-weight:500">${h.label}</div>
      ${h.paidAt?`<div style="font-size:11px;color:var(--text-3)">Paid ${fmt(h.paidAt)}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;color:var(--text-2)">${fmtMoney(h.amount)}</span>
        <span class="badge ${h.status==='paid'?'badge-green':'badge-neutral'}">${h.status==='paid'?'Paid':'Unpaid'}</span>
      </div>
    </div>`).join('')}
  </div>
  </div>`;}

function showPayModal(){
  const old=$('pay-overlay');if(old)old.remove();
  const ym=currentYM();
  const f=S.fees[ym]||{};
  const amt=f.amount||S.user.monthlyFee||0;
  // Get UPI ID from admin settings stored in Firebase (fallback to default)
  db.ref('settings/upiId').once('value').then(snap=>{
    const upiId=snap.val()||'yourname@upi';
    const upiUrl=`upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent('Math Lab')}&am=${amt}&cu=INR&tn=${encodeURIComponent('Tuition Fee '+ymLabel(ym))}`;
    const d=document.createElement('div');
    d.innerHTML=`<div id="pay-overlay" class="overlay" onclick="if(event.target===this)closePayModal()">
      <div class="qr-modal">
        <button class="qr-close" onclick="closePayModal()">✕</button>
        <div class="qr-title">Pay tuition fee</div>
        <div class="qr-sub">${ymLabel(ym)}</div>
        <div id="qr-container"></div>
        <div class="qr-upi">UPI ID: <strong>${upiId}</strong></div>
        <div class="qr-amount">${fmtMoney(amt)}</div>
        <button class="done-btn" onclick="markPaid()">Payment Done</button>
        <button onclick="closePayModal()" style="background:none;border:none;width:100%;padding:10px;font-size:13px;color:var(--text-2);cursor:pointer;font-family:var(--ff-b)">Cancel</button>
      </div>
    </div>`;
    document.body.appendChild(d.firstElementChild);
    // Generate QR code
    setTimeout(()=>{
      const container=$('qr-container');
      if(container&&typeof QRCode!=='undefined'){
        new QRCode(container,{text:upiUrl,width:200,height:200,colorDark:'#000000',colorLight:'#FFFFFF',correctLevel:QRCode.CorrectLevel.M});
      }
    },100);
  });
}

function closePayModal(){const m=$('pay-overlay');if(m)m.remove();}

async function markPaid(){
  const ym=currentYM();
  try{
    // Try backend API first (proper auth + business logic)
    await parentApi('fees/mark-paid',{uid:S.uid,ym,action:'pay'});
  }catch(e){
    // Fallback: direct Firebase write (works if rules allow)
    console.warn('API unavailable, falling back to direct write:',e.message);
    await db.ref(`fees/${S.uid}/${ym}`).update({status:'paid',paidAt:new Date().toISOString(),markedByParent:true});
  }
  // Update local state immediately so UI reflects the change
  S.fees[ym]={...(S.fees[ym]||{}),status:'paid',paidAt:new Date().toISOString(),markedByParent:true};
  closePayModal();
  render();
}

function showInstall(){
  if(S.screen==='home'){$('install-overlay').style.display='flex';return;}
  const old=$('install-overlay');if(old)old.remove();
  const d=document.createElement('div');
  d.innerHTML=`<div id="install-overlay" class="overlay" onclick="if(event.target===this)closeInstall()"><div class="sheet"><div class="sheet-handle"></div>

function closeInstall(){const m=$('install-overlay');if(m){if(S.screen==='home')m.style.display='none';else m.remove();}}
function setItab(t){S.itab=t;const b=$('install-body');if(b)b.innerHTML=installBody();document.querySelectorAll('.dtab').forEach(el=>el.classList.toggle('active',el.id==='dtab-'+t));}

function toggleMenu(e){e.stopPropagation();const d=$('menu-drop');if(!d)return;const open=d.style.display==='block';d.style.display=open?'none':'block';if(!open)setTimeout(()=>document.addEventListener('click',closeMenu,{once:true}),0);}
function closeMenu(){const d=$('menu-drop');if(d)d.style.display='none';}
function showPwModal(){$('pw-overlay').style.display='flex';}
function closePwModal(){$('pw-overlay').style.display='none';}

async function doChangePw(){
  const c=$('cp-c').value,n=$('cp-n').value,k=$('cp-k').value;
  const m=$('pw-overlay').querySelector('.sheet');
  m.querySelectorAll('.alert').forEach(e=>e.remove());
  if(n.length<6){m.insertAdjacentHTML('afterbegin',`<div class="alert alert-err">Password must be at least 6 characters.</div>`);return;}
  if(n!==k){m.insertAdjacentHTML('afterbegin',`<div class="alert alert-err">Passwords do not match.</div>`);return;}
  try{
    const user=auth.currentUser;
    const cred=firebase.auth.EmailAuthProvider.credential(user.email,c);
    await user.reauthenticateWithCredential(cred);
    await user.updatePassword(n);
    m.insertAdjacentHTML('afterbegin',`<div class="alert alert-ok">Password updated successfully.</div>`);
    setTimeout(closePwModal,1600);
  }catch(e){
    m.insertAdjacentHTML('afterbegin',`<div class="alert alert-err">${e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'Current password is incorrect.':'Failed to update.'}</div>`);
  }
}

function switchTab(t){S.tab=t;render();window.scrollTo(0,0);}
async function doLogout(){await auth.signOut();S.uid=null;S.user=null;S.classes=[];S.note=null;S.fees={};nav('login');}

// ── API HELPERS ───────────────────────────────────────────────────────
// All write operations go through the backend API.
// Reads still use Firebase directly (fast, no auth overhead for reads).

async function getIdToken(){
  const u=auth.currentUser;
  if(!u) throw new Error('Not authenticated');
  return u.getIdToken(/* forceRefresh */ false);
}

async function parentApi(endpoint, body){
  const token = await getIdToken();
  const res = await fetch(`/api/${endpoint}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'API error');
  return data.data;
}
</script>
