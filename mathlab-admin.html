<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Math Lab — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0E;--surface:#161618;--surface-alt:#1E1E21;--surface-up:#242428;
  --text:#FAFAFA;--text-2:#A1A1AA;--text-3:#52525B;
  --primary:#22C55E;--primary-r:34,197,94;--primary-lt:#052E16;--primary-hv:#16A34A;
  --danger:#F87171;--danger-lt:#1C0A0A;
  --warn:#FCD34D;--warn-lt:#1C1500;
  --border:#27272A;--border-strong:#3F3F46;
  --radius:10px;--radius-sm:7px;--radius-xs:5px;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
  --ff-d:'DM Serif Display',Georgia,serif;--ff-b:'DM Sans',sans-serif;
  --t:150ms ease;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#F7F7F6;--surface:#FFFFFF;--surface-alt:#F0EFED;--surface-up:#FFFFFF;
  --text:#18181B;--text-2:#71717A;--text-3:#A1A1AA;
  --primary:#166534;--primary-r:22,101,52;--primary-lt:#F0FDF4;--primary-hv:#14532D;
  --danger:#DC2626;--danger-lt:#FEF2F2;
  --warn:#92400E;--warn-lt:#FFFBEB;
  --border:#E4E4E7;--border-strong:#D1D1D6;
}
html{-webkit-text-size-adjust:100%;overflow-x:hidden}
body{font-family:var(--ff-b);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}
#app{display:flex;min-height:100dvh}

/* ── SIDEBAR ── */
.sidebar{width:200px;min-height:100dvh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:30}
.sb-top{padding:20px 14px 12px;border-bottom:1px solid var(--border)}
.sb-brand{display:flex;align-items:center;gap:9px}
.sb-mark{width:30px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:13px;color:#fff;flex-shrink:0}
[data-theme="dark"] .sb-mark{color:#0C0C0E}
.sb-name{font-family:var(--ff-d);font-size:15px;color:var(--text)}
.sb-sub{font-size:10px;color:var(--text-3);margin-top:1px;letter-spacing:.04em;text-transform:uppercase}
.sb-nav{flex:1;padding:10px 8px}
.nav-link{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-2);transition:all var(--t);border:none;background:none;width:100%;font-family:var(--ff-b);text-align:left;margin-bottom:1px}
.nav-link:hover{background:var(--surface-alt);color:var(--text)}
.nav-link.active{background:rgba(var(--primary-r),.1);color:var(--primary)}
.nav-badge{background:var(--danger);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;line-height:1.4}
.sb-footer{padding:10px 8px 12px;border-top:1px solid var(--border)}
.sb-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;color:var(--text-2);transition:all var(--t);border:none;background:none;width:100%;font-family:var(--ff-b);text-align:left}
.sb-btn:hover{background:var(--surface-alt);color:var(--text)}
.sb-btn.danger:hover{background:var(--danger-lt);color:var(--danger)}
@media(max-width:640px){
  .sidebar{width:50px}
  .sb-name,.sb-sub,.nav-text,.sb-btn-label{display:none}
  .nav-badge{display:none}
  .sb-top{padding:16px 10px}
  .sb-nav{padding:8px 6px}
  .nav-link{justify-content:center;padding:8px}
  .sb-btn{justify-content:center;padding:8px}
}

/* ── MAIN ── */
.main{margin-left:200px;flex:1;padding:28px 24px;min-height:100dvh}
@media(max-width:640px){.main{margin-left:50px;padding:20px 14px}}

/* ── LOGIN ── */
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow-md)}
.login-brand{text-align:center;margin-bottom:24px}
.login-mark{width:48px;height:48px;background:var(--primary);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:22px;color:#fff;margin-bottom:10px}
[data-theme="dark"] .login-mark{color:#0C0C0E}
.login-brand h1{font-family:var(--ff-d);font-size:22px;margin-bottom:3px}
.login-brand p{font-size:13px;color:var(--text-2)}

/* ── TYPOGRAPHY ── */
.page-title{font-family:var(--ff-d);font-size:22px;margin-bottom:3px}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:22px}
.section-title{font-family:var(--ff-d);font-size:18px;margin:24px 0 14px}

/* ── FORM ── */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;letter-spacing:.03em}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-xs);font-family:var(--ff-b);font-size:14px;color:var(--text);outline:none;transition:border-color var(--t),box-shadow var(--t)}
.field input:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-r),.1)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.field textarea{resize:vertical;min-height:90px}

/* ── BUTTONS ── */
.btn{padding:10px 16px;border:none;border-radius:var(--radius-xs);font-family:var(--ff-b);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t);display:inline-flex;align-items:center;gap:5px;touch-action:manipulation}
.btn-full{display:flex;width:100%;justify-content:center;padding:11px 16px;font-size:14px}
.btn-primary{background:var(--primary);color:#fff}
[data-theme="dark"] .btn-primary{color:#0C0C0E}
.btn-primary:hover{background:var(--primary-hv)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-2)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger-lt);color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-warn{background:rgba(var(--primary-r),.1);color:var(--primary);border:1px solid rgba(var(--primary-r),.2)}

/* ── ALERTS ── */
.alert{border-radius:var(--radius-xs);padding:9px 12px;font-size:13px;margin-bottom:13px;line-height:1.5}
.alert-err{background:var(--danger-lt);color:var(--danger)}
.alert-ok{background:var(--primary-lt);color:var(--primary)}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.card-row{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.card-body{flex:1;min-width:0}
.card-body h4{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body p{font-size:13px;color:var(--text-2);margin-bottom:1px;line-height:1.5}
.card-body .meta{font-size:11px;color:var(--text-3);margin-top:5px}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.badge-green{background:var(--primary-lt);color:var(--primary)}
.badge-amber{background:var(--warn-lt);color:var(--warn)}
.badge-neutral{background:var(--surface-alt);color:var(--text-2);border:1px solid var(--border)}
.badge-pending{background:rgba(252,211,77,.1);color:var(--warn)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);white-space:nowrap;background:var(--surface-alt)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-alt)}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── STATS ROW ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px}
.stat-box .sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:6px}
.stat-box .sv{font-family:var(--ff-d);font-size:22px;color:var(--primary)}
.stat-box .ss{font-size:11px;color:var(--text-2);margin-top:2px;cursor:pointer}
.stat-box .ss a{color:var(--primary)}

/* ── CREDENTIALS CARD ── */
.cred-card{background:var(--surface);border:1px solid var(--border-strong);border-left:3px solid var(--warn);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;margin-top:10px}
.cred-item .cl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:3px}
.cred-item .cv{font-weight:600;color:var(--text);font-family:monospace;letter-spacing:.03em}
.reveal-btn{background:none;border:none;cursor:pointer;color:var(--primary);font-size:12px;font-weight:600;padding:0;font-family:var(--ff-b);margin-left:8px}

/* ── BUILDER (rows) ── */
.builder{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:8px}
.builder-head{display:grid;grid-template-columns:1fr 70px 2fr 90px 32px;gap:6px;padding:7px 10px;background:var(--surface-alt);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3)}
.builder-row{display:grid;grid-template-columns:1fr 70px 2fr 90px 32px;gap:6px;padding:6px 10px;border-top:1px solid var(--border)}
.builder-row input,.builder-row select{background:var(--surface-alt);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:var(--ff-b);font-size:12px;color:var(--text);outline:none;width:100%}
.builder-row input:focus,.builder-row select:focus{border-color:var(--primary)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:14px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:color var(--t)}
.del-btn:hover{color:var(--danger)}

/* Topic rows */
.topic-builder{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:8px}
.topic-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border)}
.topic-row:last-child{border-bottom:none}
.topic-row input{flex:1;background:var(--surface-alt);border:1px solid var(--border);border-radius:4px;padding:6px 9px;font-family:var(--ff-b);font-size:13px;color:var(--text);outline:none}
.topic-row input:focus{border-color:var(--primary)}
.topic-row select{background:var(--surface-alt);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:var(--ff-b);font-size:12px;color:var(--text);outline:none;cursor:pointer}

/* Status toggle */
.status-toggle{display:flex;gap:3px}
.stbtn{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-3);font-family:var(--ff-b);transition:all var(--t)}
.stbtn.s-done{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}
.stbtn.s-ongoing{border-color:var(--warn);background:var(--warn-lt);color:var(--warn)}
.stbtn.s-not{border-color:var(--border-strong);background:var(--surface-alt);color:var(--text-2)}

/* ── NOTE PREVIEW ── */
.note-preview{background:var(--surface-alt);border-radius:var(--radius-xs);padding:12px;font-size:13px;color:var(--text-2);line-height:1.65;font-style:italic;margin-bottom:10px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:540px;box-shadow:var(--shadow-md);max-height:90dvh;overflow-y:auto;animation:fadeUp .15s ease}
.modal h3{font-family:var(--ff-d);font-size:20px;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--text-2);margin-bottom:18px}
.modal-actions{display:flex;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.modal-actions .btn{flex:1;justify-content:center}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;box-shadow:var(--shadow-md);min-width:260px;pointer-events:all;animation:slideIn .2s ease;border-left:3px solid var(--primary)}
.toast-title{font-size:13px;font-weight:600;margin-bottom:2px}
.toast-body{font-size:12px;color:var(--text-2)}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── MISC ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);cursor:pointer;margin-bottom:18px;transition:color var(--t);background:none;border:none;font-family:var(--ff-b);padding:0}
.back-btn:hover{color:var(--primary)}
.empty{text-align:center;padding:40px 20px;color:var(--text-3)}
.empty p{font-size:13px;line-height:1.6}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:20px 0}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .2s ease}
</style>
</head>
<body>
<div id="app"></div>

<script>
const K={USERS:'ml_users',CLASSES:'ml_classes',NOTES:'ml_notes',THEME:'ml_theme',ADM:'ml_adm'};
const ls=k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}};
const sl=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const getUsers=()=>ls(K.USERS)||[];
const saveUsers=u=>sl(K.USERS,u);
const getClasses=uid=>(ls(K.CLASSES)||[]).filter(c=>c.userId===uid);
const saveClasses=c=>sl(K.CLASSES,c);
const allClasses=()=>ls(K.CLASSES)||[];
const notes=()=>ls(K.NOTES)||[];
const getNote=uid=>notes().find(n=>n.userId===uid)||null;
const fmt=d=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const $=id=>document.getElementById(id);
const getCreds=()=>ls(K.ADM)||{username:'ansh',password:'mathlab2026'};

let theme=localStorage.getItem(K.THEME)||'dark';
document.documentElement.setAttribute('data-theme',theme);
function toggleTheme(){
  theme=theme==='light'?'dark':'light';
  localStorage.setItem(K.THEME,theme);
  document.documentElement.setAttribute('data-theme',theme);
  render();
}

let S={
  loggedIn:false,section:'pending',studentId:null,
  err:'',ok:'',
  approveModal:null,classModal:null,editClassId:null,editSchedId:null,noteModal:null,pwModal:false,
  af:{tcm:'8',rows:[{month:'',week:'1',topic:'',type:'New'}],topics:[{name:'',status:'not_started'}]},
  editRows:[],pendingCount:0
};

function render(){$('app').innerHTML=S.loggedIn?rShell():rLogin();}

// ── LOGIN ──────────────────────────────────────────────────────────────
function rLogin(){return`<div class="login-wrap fade">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">∑</div>
      <h1>Math Lab</h1><p>Admin Panel</p>
    </div>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    <div class="field"><label>Username</label><input id="lu" type="text" value="ansh" autocapitalize="none"/></div>
    <div class="field"><label>Password</label><input id="lp" type="password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:4px">Sign in</button>
  </div></div>`;}

function doLogin(){
  const u=$('lu').value.trim(),p=$('lp').value;
  const c=getCreds();
  if(u===c.username&&p===c.password){
    S.loggedIn=true;S.err='';
    S.pendingCount=getUsers().filter(u=>u.status==='pending').length;
    render();
  }else{S.err='Invalid credentials.';render();}
}

// ── SHELL ──────────────────────────────────────────────────────────────
function rShell(){
  const pending=getUsers().filter(u=>u.status==='pending');
  return`<div style="display:flex;min-height:100dvh" class="fade">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-mark">∑</div>
        <div><div class="sb-name">Math Lab</div><div class="sb-sub">Admin</div></div>
      </div>
    </div>
    <div class="sb-nav">
      <button class="nav-link ${S.section==='pending'&&!S.studentId?'active':''}" onclick="setSection('pending')">
        <span class="nav-text">Requests</span>
        ${pending.length?`<span class="nav-badge">${pending.length}</span>`:''}
      </button>
      <button class="nav-link ${S.section==='students'&&!S.studentId?'active':''}" onclick="setSection('students')">
        <span class="nav-text">Students</span>
      </button>
    </div>
    <div class="sb-footer">
      <button class="sb-btn" onclick="toggleTheme()"><span class="sb-btn-label">${theme==='dark'?'Light mode':'Dark mode'}</span></button>
      <button class="sb-btn" onclick="S.pwModal=true;render()"><span class="sb-btn-label">Change password</span></button>
      <button class="sb-btn danger" onclick="doLogout()"><span class="sb-btn-label">Sign out</span></button>
    </div>
  </div>
  <div class="main">
    ${S.studentId?rStudent():S.section==='pending'?rPending():rStudents()}
  </div>
  ${S.approveModal?rApproveModal():''}
  ${S.classModal?rClassModal():''}
  ${S.editClassId?rEditClassModal():''}
  ${S.editSchedId?rEditSchedModal():''}
  ${S.noteModal?rNoteModal():''}
  ${S.pwModal?rPwModal():''}
  <div class="toast-wrap" id="toast-wrap"></div>
  </div>`;}

// ── PENDING ────────────────────────────────────────────────────────────
function rPending(){
  const pending=getUsers().filter(u=>u.status==='pending');
  return`<div>
  <div class="page-title">Requests</div>
  <div class="page-sub">New parent registrations awaiting review</div>
  ${pending.length===0?`<div class="empty"><p>No pending requests.</p></div>`
  :pending.map(u=>`<div class="card">
    <div class="card-row">
      <div class="card-body">
        <h4>${u.name}</h4>
        <p>Student: <strong>${u.studentName}</strong></p>
        <p>${u.phone}${u.email?` &middot; ${u.email}`:''}</p>
        <div class="meta">Registered ${fmt(u.createdAt)}</div>
      </div>
      <div class="card-actions">
        <span class="badge badge-pending">Pending</span>
        <button class="btn btn-primary" onclick="openApprove('${u.id}')">Approve</button>
        <button class="btn btn-danger" onclick="doReject('${u.id}')">Reject</button>
      </div>
    </div>
  </div>`).join('')}</div>`;}

// ── APPROVE MODAL ──────────────────────────────────────────────────────
function openApprove(uid){
  S.approveModal=uid;
  S.af={tcm:'8',rows:[{month:'',week:'1',topic:'',type:'New'}],topics:[{name:'',status:'not_started'}]};
  render();
}
function rApproveModal(){
  const u=getUsers().find(x=>x.id===S.approveModal);
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Approve request</h3>
    <p class="modal-sub">Setting up <strong>${u.studentName}</strong> for <strong>${u.name}</strong></p>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    <div class="field"><label>Total classes per month</label>
    <input id="af-tcm" type="number" placeholder="e.g. 8" value="${S.af.tcm}" min="1" max="31"/></div>
    <div class="row-between" style="margin-top:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em">Syllabus schedule</label>
      <button class="btn btn-ghost" onclick="addAFRow()">+ Add row</button>
    </div>
    <div class="builder">
      <div class="builder-head"><span>Month</span><span>Week</span><span>Topic</span><span>Type</span><span></span></div>
      <div id="af-rows">${S.af.rows.map((r,i)=>afRowHTML(r,i)).join('')}</div>
    </div>
    <div class="row-between" style="margin-top:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em">Topics list</label>
      <button class="btn btn-ghost" onclick="addAFTopic()">+ Add topic</button>
    </div>
    <div class="topic-builder" id="af-topics">${S.af.topics.map((t,i)=>afTopicHTML(t,i)).join('')}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doApprove()">Approve & activate</button>
    </div>
  </div></div>`;}

function afRowHTML(r,i){return`<div class="builder-row">
  <input placeholder="Apr 2025" value="${r.month||''}" oninput="S.af.rows[${i}].month=this.value"/>
  <input type="number" placeholder="1" min="1" max="4" value="${r.week||''}" oninput="S.af.rows[${i}].week=this.value"/>
  <input placeholder="Topic" value="${r.topic||''}" oninput="S.af.rows[${i}].topic=this.value"/>
  <select onchange="S.af.rows[${i}].type=this.value">${['New','Revision','Test','Mixed'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select>
  <button class="del-btn" onclick="S.af.rows.splice(${i},1);reRender('af-rows',()=>S.af.rows.map((r,i)=>afRowHTML(r,i)).join(''))">✕</button>
</div>`;}

function afTopicHTML(t,i){return`<div class="topic-row">
  <input placeholder="Topic name" value="${t.name||''}" oninput="S.af.topics[${i}].name=this.value"/>
  <select onchange="S.af.topics[${i}].status=this.value">
    ${['not_started','ongoing','completed'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${s==='not_started'?'Not started':s==='ongoing'?'Ongoing':'Completed'}</option>`).join('')}
  </select>
  <button class="del-btn" onclick="S.af.topics.splice(${i},1);reRender('af-topics',()=>S.af.topics.map((t,i)=>afTopicHTML(t,i)).join(''))">✕</button>
</div>`;}

function addAFRow(){const tcm=$('af-tcm');if(tcm)S.af.tcm=tcm.value;S.af.rows.push({month:'',week:'1',topic:'',type:'New'});reRender('af-rows',()=>S.af.rows.map((r,i)=>afRowHTML(r,i)).join(''));}
function addAFTopic(){S.af.topics.push({name:'',status:'not_started'});reRender('af-topics',()=>S.af.topics.map((t,i)=>afTopicHTML(t,i)).join(''));}
function reRender(id,fn){const el=$(id);if(el)el.innerHTML=fn();}

function doApprove(){
  const tcm=parseInt($('af-tcm')?$('af-tcm').value:S.af.tcm);
  if(!tcm||tcm<1){S.err='Please set total classes per month.';render();return;}
  const all=getUsers(),i=all.findIndex(u=>u.id===S.approveModal);
  all[i].status='approved';all[i].totalClassesMonth=tcm;
  all[i].syllabusSchedule=S.af.rows.filter(r=>r.month&&r.topic);
  all[i].syllabusTopics=S.af.topics.filter(t=>t.name.trim()).map(t=>({name:t.name.trim(),status:t.status}));
  saveUsers(all);closeModals();showToast('Approved','Student portal is now active for '+all[i].name+'.');render();
}
function doReject(uid){
  if(!confirm('Reject this request?'))return;
  const all=getUsers(),i=all.findIndex(u=>u.id===uid);
  all[i].status='rejected';saveUsers(all);render();
}

// ── STUDENTS ───────────────────────────────────────────────────────────
function rStudents(){
  const students=getUsers().filter(u=>u.status==='approved');
  return`<div>
  <div class="page-title">Students</div>
  <div class="page-sub">All active students</div>
  ${students.length===0?`<div class="empty"><p>No students yet. Approve a request first.</p></div>`
  :students.map(u=>{
    const cls=getClasses(u.id),now=new Date();
    const ctm=cls.filter(c=>{const d=new Date(c.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
    const done=(u.syllabusTopics||[]).filter(t=>t.status==='completed').length;
    return`<div class="card" style="cursor:pointer" onclick="openStudent('${u.id}')">
      <div class="card-row">
        <div class="card-body">
          <h4>${u.studentName}</h4>
          <p>${u.name} &middot; ${u.phone}</p>
          <div class="meta">${ctm}/${u.totalClassesMonth} classes this month &nbsp;&middot;&nbsp; ${done}/${(u.syllabusTopics||[]).length} topics done</div>
        </div>
        <div class="card-actions"><button class="btn btn-ghost">View</button></div>
      </div>
    </div>`;}).join('')}</div>`;}

// ── STUDENT DETAIL ─────────────────────────────────────────────────────
function openStudent(id){S.studentId=id;S.section='students';render();}
function rStudent(){
  const u=getUsers().find(x=>x.id===S.studentId);if(!u)return'';
  const cls=getClasses(u.id),n=getNote(u.id),now=new Date();
  const ctm=cls.filter(c=>{const d=new Date(c.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;

  return`<div>
  <button class="back-btn" onclick="S.studentId=null;render()">← Students</button>
  <div class="row-between" style="margin-bottom:20px">
    <div><div class="page-title" style="margin-bottom:2px">${u.studentName}</div>
    <div style="font-size:13px;color:var(--text-2)">${u.name} &middot; ${u.phone}</div></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-warn" onclick="openNote('${u.id}')">Teacher's note</button>
      <button class="btn btn-primary" onclick="openClass('${u.id}')">Log class</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><div class="sl">This month</div><div class="sv">${ctm}<span style="font-size:14px;color:var(--text-3)"> / ${u.totalClassesMonth}</span></div></div>
    <div class="stat-box"><div class="sl">Total classes</div><div class="sv">${cls.length}</div></div>
    <div class="stat-box"><div class="sl">Topics done</div><div class="sv">${done}<span style="font-size:14px;color:var(--text-3)"> / ${(u.syllabusTopics||[]).length}</span></div></div>
    <div class="stat-box"><div class="sl">Per month</div><div class="sv" style="font-size:18px">${u.totalClassesMonth}</div><div class="ss"><a onclick="editTCM('${u.id}')">Edit</a></div></div>
  </div>

  <div class="cred-card">
    <div style="font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Parent credentials <span style="font-size:10px;color:var(--text-3);font-weight:400;text-transform:none;letter-spacing:0">— admin only</span></div>
    <div class="cred-grid">
      <div class="cred-item"><div class="cl">Login name</div><div class="cv">${u.name}</div></div>
      <div class="cred-item"><div class="cl">Email</div><div class="cv" style="font-size:12px">${u.email||'—'}</div></div>
      <div class="cred-item"><div class="cl">Phone</div><div class="cv">${u.phone}</div></div>
      <div class="cred-item"><div class="cl">Password</div>
        <div style="display:flex;align-items:center">
          <span id="pw-reveal" class="cv">••••••••</span>
          <button class="reveal-btn" onclick="toggleReveal('${u.password}')">Show</button>
        </div>
      </div>
    </div>
  </div>

  ${n?`<div class="card" style="margin-bottom:20px">
    <div class="row-between" style="margin-bottom:8px">
      <div style="font-size:13px;font-weight:600">Teacher's note</div>
      <div style="font-size:11px;color:var(--text-3)">${n.weekOf?`Week of ${fmt(n.weekOf)}`:''}</div>
    </div>
    <div class="note-preview">${n.note}</div>
    <button class="btn btn-ghost" onclick="openNote('${u.id}')">Edit</button>
  </div>`:''}

  <div class="section-title">Classes</div>
  ${cls.length===0?`<div class="empty"><p>No classes logged yet.</p></div>`
  :`<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Topic</th><th>Homework</th><th>HW done</th><th>Actions</th></tr></thead>
    <tbody>${cls.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(c=>`<tr>
      <td style="white-space:nowrap">${fmt(c.date)}</td>
      <td>${c.topic}</td>
      <td>${c.homework||'—'}</td>
      <td><button onclick="toggleHW('${c.id}')" class="badge ${c.hwDone?'badge-green':'badge-amber'}" style="cursor:pointer;border:none;font-family:var(--ff-b)">${c.hwDone?'Done':'Pending'}</button></td>
      <td><div class="td-actions">
        <button class="btn btn-ghost" onclick="openEditClass('${c.id}')">Edit</button>
        <button class="btn btn-danger" onclick="delClass('${c.id}')">Delete</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div>`}

  <div class="row-between" style="margin-top:4px">
    <div class="section-title" style="margin:0">Syllabus schedule</div>
    <button class="btn btn-ghost" onclick="openEditSched('${u.id}')">Edit schedule</button>
  </div>
  <div style="margin-top:12px"></div>
  ${(u.syllabusSchedule&&u.syllabusSchedule.length)?`
  <div class="table-wrap"><table>
    <thead><tr><th>Month</th><th>Week</th><th>Topic</th><th>Type</th></tr></thead>
    <tbody>${u.syllabusSchedule.map(s=>`<tr>
      <td style="white-space:nowrap">${s.month}</td><td>Wk ${s.week}</td>
      <td>${s.topic}</td><td><span class="badge badge-amber">${s.type}</span></td>
    </tr>`).join('')}</tbody>
  </table></div>`:`<div class="empty"><p>No schedule set. <button class="btn btn-ghost" style="margin-top:8px;display:inline-flex" onclick="openEditSched('${u.id}')">Add now</button></p></div>`}

  <div class="section-title">Topics progress</div>
  ${(u.syllabusTopics&&u.syllabusTopics.length)?`
  <div class="table-wrap"><table>
    <thead><tr><th>Topic</th><th>Status</th></tr></thead>
    <tbody>${u.syllabusTopics.map((t,i)=>`<tr>
      <td>${t.name}</td>
      <td><div class="status-toggle">
        <button class="stbtn ${t.status==='completed'?'s-done':''}" onclick="setStatus('${u.id}',${i},'completed')">Done</button>
        <button class="stbtn ${t.status==='ongoing'?'s-ongoing':''}" onclick="setStatus('${u.id}',${i},'ongoing')">Ongoing</button>
        <button class="stbtn ${t.status==='not_started'?'s-not':''}" onclick="setStatus('${u.id}',${i},'not_started')">Not yet</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div>`:`<div class="empty"><p>No topics set.</p></div>`}
  </div>`;}

// ── LOG CLASS MODAL ────────────────────────────────────────────────────
function openClass(uid){S.classModal=uid;render();}
function rClassModal(){
  const u=getUsers().find(x=>x.id===S.classModal);
  const today=new Date().toISOString().split('T')[0];
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Log class</h3><p class="modal-sub">${u.studentName}</p>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    <div class="field"><label>Date</label><input id="cl-d" type="date" value="${today}"/></div>
    <div class="field"><label>Topic covered</label><input id="cl-t" type="text" placeholder="e.g. Linear Equations — Introduction"/></div>

    <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
      <input id="cl-done" type="checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary)"/>
      <label for="cl-done" style="font-size:13px;cursor:pointer;color:var(--text)">Homework already done</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doLogClass()">Save</button>
    </div>
  </div></div>`;}

function doLogClass(){
  const d=$('cl-d').value,t=$('cl-t').value.trim();
  if(!d||!t){S.err='Date and topic are required.';render();return;}
  const nc={id:Date.now().toString(),userId:S.classModal,date:d,topic:t,homework:$('cl-h').value.trim(),hwDone:$('cl-done').checked};
  const all=allClasses();all.push(nc);saveClasses(all);closeModals();showToast('Class logged','Session saved successfully.');render();
}

// ── EDIT CLASS MODAL ───────────────────────────────────────────────────
function openEditClass(id){S.editClassId=id;S.classModal=null;render();}
function rEditClassModal(){
  const c=allClasses().find(x=>x.id===S.editClassId);if(!c)return'';
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Edit class</h3><p class="modal-sub">${fmt(c.date)}</p>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    <div class="field"><label>Date</label><input id="ec-d" type="date" value="${c.date}"/></div>
    <div class="field"><label>Topic covered</label><input id="ec-t" type="text" value="${c.topic}"/></div>
    <div class="field"><label>Homework assigned</label><input id="ec-h" type="text" value="${c.homework||''}"/></div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
      <input id="ec-done" type="checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary)" ${c.hwDone?'checked':''}/>
      <label for="ec-done" style="font-size:13px;cursor:pointer;color:var(--text)">Homework done</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doEditClass()">Save changes</button>
    </div>
  </div></div>`;}

function doEditClass(){
  const d=$('ec-d').value,t=$('ec-t').value.trim();
  if(!d||!t){S.err='Date and topic are required.';render();return;}
  const all=allClasses(),i=all.findIndex(c=>c.id===S.editClassId);
  all[i]={...all[i],date:d,topic:t,homework:$('ec-h').value.trim(),hwDone:$('ec-done').checked};
  saveClasses(all);closeModals();showToast('Updated','Class entry saved.');render();
}

// ── EDIT SCHEDULE MODAL ────────────────────────────────────────────────
function openEditSched(uid){
  const u=getUsers().find(x=>x.id===uid);
  S.editSchedId=uid;
  S.editRows=u.syllabusSchedule&&u.syllabusSchedule.length?JSON.parse(JSON.stringify(u.syllabusSchedule)):[{month:'',week:'1',topic:'',type:'New'}];
  render();
}
function rEditSchedModal(){
  const u=getUsers().find(x=>x.id===S.editSchedId);if(!u)return'';
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal" style="max-width:600px">
    <h3>Edit syllabus schedule</h3><p class="modal-sub">${u.studentName}</p>
    <div class="row-between">
      <label style="font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em">Schedule rows</label>
      <button class="btn btn-ghost" onclick="S.editRows.push({month:'',week:'1',topic:'',type:'New'});reRender('er-rows',()=>S.editRows.map((r,i)=>erHTML(r,i)).join(''))">+ Add row</button>
    </div>
    <div class="builder" style="margin-top:8px">
      <div class="builder-head"><span>Month</span><span>Week</span><span>Topic</span><span>Type</span><span></span></div>
      <div id="er-rows">${S.editRows.map((r,i)=>erHTML(r,i)).join('')}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doSaveSched()">Save schedule</button>
    </div>
  </div></div>`;}

function erHTML(r,i){return`<div class="builder-row">
  <input placeholder="Apr 2025" value="${r.month||''}" oninput="S.editRows[${i}].month=this.value"/>
  <input type="number" min="1" max="4" value="${r.week||''}" oninput="S.editRows[${i}].week=this.value"/>
  <input placeholder="Topic" value="${r.topic||''}" oninput="S.editRows[${i}].topic=this.value"/>
  <select onchange="S.editRows[${i}].type=this.value">${['New','Revision','Test','Mixed'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select>
  <button class="del-btn" onclick="S.editRows.splice(${i},1);reRender('er-rows',()=>S.editRows.map((r,i)=>erHTML(r,i)).join(''))">✕</button>
</div>`;}

function doSaveSched(){
  const all=getUsers(),i=all.findIndex(u=>u.id===S.editSchedId);
  all[i].syllabusSchedule=S.editRows.filter(r=>r.month&&r.topic);
  saveUsers(all);closeModals();showToast('Updated','Syllabus schedule saved.');render();
}

// ── NOTE MODAL ─────────────────────────────────────────────────────────
function openNote(uid){S.noteModal=uid;render();}
function rNoteModal(){
  const u=getUsers().find(x=>x.id===S.noteModal);
  const ex=getNote(u.id);
  const today=new Date().toISOString().split('T')[0];
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Teacher's note</h3><p class="modal-sub">${u.studentName} — visible to parent all week</p>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    <div class="field"><label>Week starting</label><input id="nt-w" type="date" value="${ex&&ex.weekOf?ex.weekOf.split('T')[0]:today}"/></div>
    <div class="field"><label>Note</label><textarea id="nt-n" placeholder="Write your note for this week...">${ex?ex.note:''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doSaveNote()">Save note</button>
    </div>
  </div></div>`;}

function doSaveNote(){
  const n=$('nt-n').value.trim(),w=$('nt-w').value;
  if(!n){S.err='Please write a note.';render();return;}
  const all=notes().filter(x=>x.userId!==S.noteModal);
  all.push({userId:S.noteModal,note:n,weekOf:w});sl(K.NOTES,all);
  closeModals();showToast('Note saved','Parents can now see the note.');render();
}

// ── CHANGE PASSWORD MODAL ──────────────────────────────────────────────
function rPwModal(){
  const c=getCreds();
  return`<div class="overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Change password</h3>
    ${S.err?`<div class="alert alert-err">${S.err}</div>`:''}
    ${S.ok?`<div class="alert alert-ok">${S.ok}</div>`:''}
    <div class="field"><label>Username</label><input id="pw-u" type="text" value="${c.username}"/></div>
    <div class="field"><label>Current password</label><input id="pw-c" type="password"/></div>
    <div class="field"><label>New password</label><input id="pw-n" type="password" placeholder="Leave blank to keep current"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doSavePw()">Save</button>
    </div>
  </div></div>`;}

function doSavePw(){
  const u=$('pw-u').value.trim(),c=$('pw-c').value,n=$('pw-n').value;
  const creds=getCreds();
  if(c!==creds.password){S.err='Current password is incorrect.';render();return;}
  if(!u){S.err='Username cannot be empty.';render();return;}
  sl(K.ADM,{username:u,password:n||creds.password});
  S.ok='Password updated.';S.err='';render();
  setTimeout(closeModals,1400);
}

// ── HELPERS ────────────────────────────────────────────────────────────
function setStatus(uid,idx,status){
  const all=getUsers(),i=all.findIndex(u=>u.id===uid);
  all[i].syllabusTopics[idx].status=status;saveUsers(all);render();
}
function toggleHW(id){
  const all=allClasses(),i=all.findIndex(c=>c.id===id);
  all[i].hwDone=!all[i].hwDone;saveClasses(all);render();
}
function delClass(id){
  if(!confirm('Delete this class entry?'))return;
  saveClasses(allClasses().filter(c=>c.id!==id));render();
}
function editTCM(uid){
  const all=getUsers(),i=all.findIndex(u=>u.id===uid);
  const v=prompt('Total classes per month:',all[i].totalClassesMonth);
  if(v===null)return;const n=parseInt(v);
  if(!n||n<1){alert('Enter a valid number.');return;}
  all[i].totalClassesMonth=n;saveUsers(all);render();
}
function toggleReveal(pw){
  const el=$('pw-reveal'),btn=el&&el.nextElementSibling;if(!el)return;
  const hidden=el.textContent==='••••••••';
  el.textContent=hidden?pw:'••••••••';
  if(btn)btn.textContent=hidden?'Hide':'Show';
}
function setSection(s){S.section=s;S.studentId=null;S.ok='';render();}
function closeModals(){S.approveModal=null;S.classModal=null;S.editClassId=null;S.editSchedId=null;S.noteModal=null;S.pwModal=false;S.err='';S.ok='';render();}
function doLogout(){S.loggedIn=false;render();}

// Toast
function showToast(title,body){
  const wrap=$('toast-wrap');if(!wrap)return;
  const id='t'+Date.now();
  const el=document.createElement('div');
  el.className='toast';el.id=id;
  el.innerHTML=`<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
  wrap.appendChild(el);setTimeout(()=>{const e=$(id);if(e)e.remove();},4000);
}

// Auto-refresh
let lastPending=0;
window.addEventListener('storage',e=>{if(e.key===K.USERS&&S.loggedIn){const p=getUsers().filter(u=>u.status==='pending');if(p.length>lastPending){showToast('New request',p[p.length-1].name+' signed up.');if(!S.studentId&&!S.approveModal){S.section='pending';render();}}lastPending=p.length;}});
setInterval(()=>{if(!S.loggedIn)return;const p=getUsers().filter(u=>u.status==='pending');if(p.length>lastPending){showToast('New request',p[p.length-1].name+' signed up.');lastPending=p.length;if(!S.studentId&&!S.approveModal){S.section='pending';render();}}},10000);

render();
</script>
</body>
