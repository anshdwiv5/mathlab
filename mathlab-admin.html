<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Lab — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--bg-card:#1A2030;--bg-side:#141824;--bg-in:#242A3C;
  --text:#E8E6E0;--text-2:#9CA3AF;--text-3:#6B7280;
  --primary:#4ADE80;--primary-r:74,222,128;--primary-lt:#052E16;--primary-hv:#22C55E;
  --accent:#FCD34D;--accent-lt:#1C1709;--accent-r:252,211,77;
  --red:#F87171;--red-lt:#2D0F0F;
  --border:#2D3348;--border-lt:#242A3C;
  --r:12px;--r-sm:8px;--sh:0 1px 12px rgba(0,0,0,.2);--sh-lg:0 4px 28px rgba(0,0,0,.35);
  --t:.2s ease;--ff-d:'DM Serif Display',Georgia,serif;--ff-b:'DM Sans',sans-serif;
}
[data-theme="light"]{
  --bg:#F5F2EB;--bg-card:#FFFFFF;--bg-side:#1A2030;--bg-in:#EDE9DC;
  --text:#1C1917;--text-2:#57534E;--text-3:#A8A29E;
  --primary:#166534;--primary-r:22,101,52;--primary-lt:#DCFCE7;--primary-hv:#14532D;
  --accent:#B45309;--accent-lt:#FEF3C7;--accent-r:180,83,9;
  --red:#DC2626;--red-lt:#FEE2E2;
  --border:#D6D0BE;--border-lt:#E7E4D8;
}
body{font-family:var(--ff-b);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t)}

/* ── LAYOUT ── */
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50}
.main{margin-left:220px;flex:1;padding:28px;min-height:100vh}
@media(max-width:640px){.sidebar{width:60px}.sidebar .nav-label,.sidebar .logo-txt,.sidebar .admin-badge{display:none}.main{margin-left:60px;padding:16px}}

/* Sidebar */
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#0F1117;font-family:var(--ff-d);font-size:17px;font-weight:700}
.logo-txt{display:flex;flex-direction:column}
.logo-txt strong{font-family:var(--ff-d);font-size:16px;color:var(--text);line-height:1}
.logo-txt small{font-size:11px;color:var(--text-3);margin-top:2px}
.sb-nav{flex:1;padding:14px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;transition:all var(--t);margin-bottom:2px;color:var(--text-2);font-size:14px;font-weight:500}
.nav-item:hover{background:var(--bg-in);color:var(--text)}
.nav-item.active{background:rgba(var(--primary-r),.12);color:var(--primary)}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-badge{background:var(--red);color:#fff;border-radius:50px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:auto}
.sb-footer{padding:14px 10px;border-top:1px solid var(--border)}
.admin-info{padding:8px 10px;font-size:12px;color:var(--text-3)}
.admin-badge{font-weight:600;color:var(--text-2);font-size:13px;display:block;margin-bottom:2px}

/* Theme toggle */
.th-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text-2);font-size:13px;transition:all var(--t);background:none;border:none;font-family:var(--ff-b);width:100%}
.th-btn:hover{background:var(--bg-in);color:var(--text)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--red);font-size:13px;transition:all var(--t);background:none;border:none;font-family:var(--ff-b);width:100%;margin-top:4px}
.logout-btn:hover{background:var(--red-lt)}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--sh-lg)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:56px;height:56px;background:var(--primary);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:26px;color:#0F1117;margin-bottom:10px}
.login-logo h1{font-family:var(--ff-d);font-size:24px}
.login-logo p{font-size:13px;color:var(--text-2);margin-top:3px}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 14px;background:var(--bg-in);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--ff-b);font-size:14px;color:var(--text);transition:all var(--t);outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-r),.12)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text-3)}
.fg textarea{resize:vertical;min-height:80px}

/* ── BUTTONS ── */
.btn{padding:11px 18px;border:none;border-radius:var(--r-sm);font-family:var(--ff-b);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t);display:inline-flex;align-items:center;gap:6px}
.btn-full{width:100%}
.btn-p{background:var(--primary);color:#0F1117}
.btn-p:hover{background:var(--primary-hv);transform:translateY(-1px)}
.btn-p:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-gh{background:transparent;border:1.5px solid var(--border);color:var(--text-2)}
.btn-gh:hover{border-color:var(--primary);color:var(--primary)}
.btn-red{background:var(--red-lt);color:var(--red);border:1.5px solid var(--red)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-accent{background:rgba(var(--accent-r),.15);color:var(--accent);border:1.5px solid var(--accent)}
.btn-accent:hover{background:var(--accent);color:#0F1117}

/* ── PAGE HEADERS ── */
.page-title{font-family:var(--ff-d);font-size:26px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--text-2);margin-bottom:24px}
.section-title{font-family:var(--ff-d);font-size:20px;margin-bottom:14px;margin-top:28px}

/* ── ALERTS ── */
.err{background:var(--red-lt);color:var(--red);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;margin-bottom:14px}
.succ{background:var(--primary-lt);color:var(--primary);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;margin-bottom:14px}

/* ── CARDS ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.card-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.card-info{flex:1;min-width:180px}
.card-info h4{font-weight:600;font-size:15px;margin-bottom:3px}
.card-info p{font-size:13px;color:var(--text-2);margin-bottom:2px}
.card-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.card+.card{margin-top:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:50px;font-size:11px;font-weight:600}
.bdg-p{background:rgba(var(--accent-r),.15);color:var(--accent)}
.bdg-g{background:var(--primary-lt);color:var(--primary)}
.bdg-r{background:var(--red-lt);color:var(--red)}
.bdg-gr{background:var(--border);color:var(--text-2)}
.bdg-y{background:rgba(var(--accent-r),.12);color:var(--accent)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:24px}
table{width:100%;border-collapse:collapse;background:var(--bg-card);font-size:13px}
th{background:rgba(var(--primary-r),.08);color:var(--primary);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border-lt);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-in)}
.td-actions{display:flex;gap:6px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:560px;box-shadow:var(--sh-lg);max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--ff-d);font-size:22px;margin-bottom:6px}
.modal .modal-sub{font-size:13px;color:var(--text-2);margin-bottom:20px}
.modal-footer{display:flex;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.modal-footer .btn{flex:1}

/* Syllabus row builder */
.rows-builder{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:10px}
.row-hd{display:grid;grid-template-columns:1fr 80px 2fr 1fr 36px;gap:6px;padding:8px 10px;background:var(--bg-in);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3)}
.rb-row{display:grid;grid-template-columns:1fr 80px 2fr 1fr 36px;gap:6px;padding:6px 10px;border-top:1px solid var(--border-lt)}
.rb-row input,.rb-row select{background:var(--bg-in);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:var(--ff-b);font-size:13px;color:var(--text);outline:none;width:100%}
.rb-row input:focus,.rb-row select:focus{border-color:var(--primary)}
.rb-del{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:16px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;transition:color var(--t)}
.rb-del:hover{color:var(--red)}

/* Topics builder */
.topics-list{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:10px}
.topic-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border-lt)}
.topic-row:last-child{border-bottom:none}
.topic-row input{flex:1;background:var(--bg-in);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:var(--ff-b);font-size:13px;color:var(--text);outline:none}
.topic-row input:focus{border-color:var(--primary)}
.topic-status-sel{background:var(--bg-in);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--ff-b);font-size:12px;color:var(--text);outline:none;cursor:pointer}

/* Status toggle in student view */
.status-toggle{display:flex;gap:4px}
.st-btn{padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-3);font-family:var(--ff-b);transition:all var(--t)}
.st-btn.active-completed{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}
.st-btn.active-ongoing{border-color:var(--accent);background:rgba(var(--accent-r),.1);color:var(--accent)}
.st-btn.active-not{border-color:var(--border);background:var(--border-lt);color:var(--text-2)}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-mini{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.stat-mini .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);margin-bottom:6px}
.stat-mini .val{font-family:var(--ff-d);font-size:26px;color:var(--primary)}
.stat-mini .sub{font-size:12px;color:var(--text-2);margin-top:2px}

/* Toast notification */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh-lg);display:flex;align-items:flex-start;gap:12px;min-width:280px;max-width:360px;pointer-events:all;animation:slideIn .3s ease forwards}
.toast-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.toast-body strong{display:block;font-size:14px;margin-bottom:2px}
.toast-body p{font-size:13px;color:var(--text-2)}
.toast-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:16px;flex-shrink:0;padding:0}
.toast-close:hover{color:var(--text)}
.toast.new-request{border-left:3px solid var(--accent)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* Back btn */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);cursor:pointer;margin-bottom:20px;transition:color var(--t);background:none;border:none;font-family:var(--ff-b)}
.back-btn:hover{color:var(--primary)}

/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--text-3)}
.empty .ei{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .3s ease forwards}

/* Student tag */
.student-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(var(--primary-r),.1);border:1px solid rgba(var(--primary-r),.25);color:var(--primary);padding:4px 12px;border-radius:50px;font-size:13px;font-weight:600;margin-bottom:16px}

/* Note textarea */
.note-preview{background:var(--bg-in);border-radius:var(--r-sm);padding:14px;font-size:14px;color:var(--text-2);line-height:1.65;font-style:italic;min-height:60px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const K = { USERS:'ml_users', CLASSES:'ml_classes', NOTES:'ml_notes', THEME:'ml_theme', ADM:'ml_adm' };
const getLS = k => { try { return JSON.parse(localStorage.getItem(k)||'null') } catch { return null } };
const setLS = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const getUsers = () => getLS(K.USERS)||[];
const saveUsers = u => setLS(K.USERS,u);
const getClasses = uid => (getLS(K.CLASSES)||[]).filter(c=>c.userId===uid);
const saveClasses = classes => setLS(K.CLASSES, classes);
const getAllClasses = () => getLS(K.CLASSES)||[];
const getNotes = () => getLS(K.NOTES)||[];
const getNote = uid => getNotes().find(n=>n.userId===uid)||null;
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const $ = id => document.getElementById(id);

// Default admin credentials
function getAdmCreds(){ return getLS(K.ADM)||{username:'ansh',password:'mathlab2024'} }

// ── THEME ─────────────────────────────────────────────────────────────
let theme = localStorage.getItem(K.THEME)||'dark';
document.documentElement.setAttribute('data-theme', theme);
function toggleTheme(){
  theme = theme==='light'?'dark':'light';
  localStorage.setItem(K.THEME,theme);
  document.documentElement.setAttribute('data-theme',theme);
  render();
}

// ── STATE ─────────────────────────────────────────────────────────────
let S = {
  loggedIn: false, section:'pending', studentId:null,
  error:'', info:'',
  // modals
  approveModal:null,       // userId
  classModal:null,         // userId
  noteModal:null,          // userId
  settingsModal:false,
  // Approval form data
  af: { totalClassesMonth:'', schedRows:[{month:'',week:'',topic:'',type:''}], topics:[{name:'',status:'not_started'}] }
};

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  $('app').innerHTML = S.loggedIn ? rAdmin() : rLogin();
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function rLogin(){
  return `<div class="login-screen fade-in">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">∑</div>
      <h1>Math Lab</h1><p>Admin Panel</p>
    </div>
    ${S.error?`<div class="err">${S.error}</div>`:''}
    <div class="fg"><label>Username</label><input id="lu" type="text" placeholder="ansh" value="ansh" /></div>
    <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doAdmLogin()" /></div>
    <button class="btn btn-p btn-full" onclick="doAdmLogin()" style="margin-top:4px">Sign In →</button>
  </div></div>`;
}

function doAdmLogin(){
  const u=$('lu').value.trim(), p=$('lp').value;
  const creds = getAdmCreds();
  if(u===creds.username && p===creds.password){
    S.loggedIn=true; S.error='';
    lastKnownPendingCount = getUsers().filter(u=>u.status==='pending').length;
    render();
  }
  else { S.error='Invalid credentials.'; render(); }
}

// ── ADMIN SHELL ───────────────────────────────────────────────────────
function rAdmin(){
  const users = getUsers();
  const pending = users.filter(u=>u.status==='pending');
  return `<div class="app-wrap fade-in">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">∑</div>
      <div class="logo-txt"><strong>Math Lab</strong><small>Admin</small></div>
    </div>
    <div class="sb-nav">
      <div class="nav-item ${S.section==='pending'&&!S.studentId?'active':''}" onclick="setSection('pending')">
        <span class="nav-icon">📥</span><span class="nav-label">Requests</span>
        ${pending.length>0?`<span class="nav-badge">${pending.length}</span>`:''}
      </div>
      <div class="nav-item ${S.section==='students'&&!S.studentId?'active':''}" onclick="setSection('students')">
        <span class="nav-icon">👨‍🎓</span><span class="nav-label">Students</span>
      </div>
    </div>
    <div class="sb-footer">
      <div class="admin-info"><span class="admin-badge">Ansh</span>Admin</div>
      <button class="th-btn" onclick="toggleTheme()"><span>${theme==='dark'?'☀️':'🌙'}</span><span class="nav-label">${theme==='dark'?'Light':'Dark'} mode</span></button>
      <button class="th-btn" onclick="showSettings()"><span>⚙️</span><span class="nav-label">Settings</span></button>
      <button class="logout-btn" onclick="doLogout()"><span>🚪</span><span class="nav-label">Sign Out</span></button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    ${S.studentId ? rStudentDetail() : S.section==='pending' ? rPending() : rStudents()}
  </div>

  <!-- MODALS -->
  ${S.approveModal ? rApproveModal() : ''}
  ${S.classModal ? rClassModal() : ''}
  ${S.editClassId ? rEditClassModal() : ''}
  ${S.editSchedUid ? rEditSchedModal() : ''}
  ${S.noteModal ? rNoteModal() : ''}
  ${S.settingsModal ? rSettingsModal() : ''}
  <div class="toast-wrap" id="toast-wrap"></div>
  </div>`;
}

// ── PENDING REQUESTS ──────────────────────────────────────────────────
function rPending(){
  const pending = getUsers().filter(u=>u.status==='pending');
  return `<div>
  <p class="page-title">Sign-up Requests</p>
  <p class="page-sub">Review and approve new parent registrations</p>
  ${pending.length===0
    ?`<div class="empty"><div class="ei">✅</div><p>No pending requests. All caught up!</p></div>`
    :pending.map(u=>`<div class="card">
      <div class="card-row">
        <div class="card-info">
          <h4>${u.name}</h4>
          <p>👤 Student: <strong>${u.studentName}</strong></p>
          <p>📱 ${u.phone}</p>
          <p style="font-size:12px;color:var(--text-3);margin-top:4px">Registered ${fmtDate(u.createdAt)}</p>
        </div>
        <div class="card-actions">
          <span class="badge bdg-p">Pending</span>
          <button class="btn btn-p btn-sm" onclick="openApproveModal('${u.id}')">✓ Approve</button>
          <button class="btn btn-red btn-sm" onclick="doReject('${u.id}')">✕ Reject</button>
        </div>
      </div>
    </div>`).join('')
  }</div>`;
}

// ── APPROVE MODAL ─────────────────────────────────────────────────────
function openApproveModal(uid){
  const u = getUsers().find(x=>x.id===uid);
  S.approveModal = uid;
  S.af = { totalClassesMonth:'8', schedRows:[{month:'',week:'1',topic:'',type:'New'}], topics:[{name:'',status:'not_started'}] };
  render();
}

function rApproveModal(){
  const u = getUsers().find(x=>x.id===S.approveModal);
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Approve Request</h3>

}

function topicRowHTML(t,i){
  return `<div class="topic-row" id="tr-${i}">

function syncAfFromDOM(){
  S.af.totalClassesMonth = $('af-tcm') ? $('af-tcm').value : S.af.totalClassesMonth;
}

function addSchedRow(){ syncAfFromDOM(); S.af.schedRows.push({month:'',week:'',topic:'',type:'New'}); rerenderApproveModal(); }
function delSchedRow(i){ syncAfFromDOM(); S.af.schedRows.splice(i,1); rerenderApproveModal(); }
function updateSchedRow(i,k,v){ if(S.af.schedRows[i]) S.af.schedRows[i][k]=v; }
function addTopicRow(){ syncAfFromDOM(); S.af.topics.push({name:'',status:'not_started'}); rerenderApproveModal(); }
function delTopicRow(i){ syncAfFromDOM(); S.af.topics.splice(i,1); rerenderApproveModal(); }
function updateTopicRow(i,k,v){ if(S.af.topics[i]) S.af.topics[i][k]=v; }

function rerenderApproveModal(){
  S.af.totalClassesMonth = $('af-tcm') ? $('af-tcm').value : S.af.totalClassesMonth;
  const sr=$('sched-rows'); if(sr) sr.innerHTML=S.af.schedRows.map((r,i)=>schedRowHTML(r,i)).join('');
  const tl=$('topics-list'); if(tl) tl.innerHTML=S.af.topics.map((t,i)=>topicRowHTML(t,i)).join('');
}

function doApprove(){
  syncAfFromDOM();
  const tcm = parseInt(S.af.totalClassesMonth);
  if(!tcm||tcm<1) { S.error='Please set total classes per month.'; render(); return; }
  const topics = S.af.topics.filter(t=>t.name.trim());
  const schedRows = S.af.schedRows.filter(r=>r.month&&r.topic);
  const users = getUsers();
  const idx = users.findIndex(u=>u.id===S.approveModal);
  users[idx].status='approved';
  users[idx].totalClassesMonth=tcm;
  users[idx].syllabusSchedule=schedRows;
  users[idx].syllabusTopics=topics.map(t=>({name:t.name.trim(),status:t.status}));
  saveUsers(users);
  closeModals();
  S.info=`${users[idx].name} approved! They can now log in.`;
  render();
}

function doReject(uid){
  if(!confirm('Reject this sign-up request?')) return;
  const users=getUsers(), idx=users.findIndex(u=>u.id===uid);
  users[idx].status='rejected'; saveUsers(users); render();
}

    <div class="fg">
      <label>Week Starting</label>
      <input id="nt-week" type="date" value="${existing&&existing.weekOf?existing.weekOf.split('T')[0]:today}" />
    </div>
    <div class="fg">
      <label>Note *</label>
      <textarea id="nt-note" placeholder="e.g. ${u.studentName} did really well with fractions this week. Please ensure they revise Ex 4.3 before the next class...">${existing?existing.note:''}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gh" onclick="closeModals()">Cancel</button>
      <button class="btn btn-p" onclick="doSaveNote()">Save Note →</button>
    </div>
  </div></div>`;
}

function doSaveNote(){
  const note=$('nt-note').value.trim(), week=$('nt-week').value;
  if(!note){ S.error='Please write a note.'; render(); return; }
  const all=getNotes().filter(n=>n.userId!==S.noteModal);
  all.push({userId:S.noteModal, note, weekOf:week}); setLS(K.NOTES,all);
  closeModals(); S.info='Teacher\'s note saved!'; render();
}

// ── SETTINGS MODAL ────────────────────────────────────────────────────
function showSettings(){ S.settingsModal=true; render(); }

function rSettingsModal(){
  const creds=getAdmCreds();
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Settings</h3>
    <p class="modal-sub">Admin account settings</p>
    ${S.error?`<div class="err">${S.error}</div>`:''}
    ${S.info?`<div class="succ">${S.info}</div>`:''}
    <div class="fg"><label>Username</label><input id="set-u" type="text" value="${creds.username}" /></div>
    <div class="fg"><label>Current Password</label><input id="set-cp" type="password" placeholder="Current password" /></div>
    <div class="fg"><label>New Password</label><input id="set-np" type="password" placeholder="New password (leave blank to keep)" /></div>
    <div class="modal-footer">
      <button class="btn btn-gh" onclick="closeModals()">Cancel</button>
      <button class="btn btn-p" onclick="doSaveSettings()">Save Changes</button>
    </div>
  </div></div>`;
}

function doSaveSettings(){
  const cu=$('set-u').value.trim(), cp=$('set-cp').value, np=$('set-np').value;
  const creds=getAdmCreds();
  if(cp!==creds.password){ S.error='Current password is incorrect.'; renderSettingsAlerts(); return; }
  if(!cu){ S.error='Username cannot be empty.'; renderSettingsAlerts(); return; }
  const updated={username:cu, password:np||creds.password};
  setLS(K.ADM,updated); S.error=''; S.info='Settings saved!'; renderSettingsAlerts();
  setTimeout(closeModals, 1500);
}

function renderSettingsAlerts(){
  const modal=$('app').querySelector('.modal');
  modal.querySelectorAll('.err,.succ').forEach(e=>e.remove());
  if(S.error) modal.insertAdjacentHTML('afterbegin',`<div class="err">${S.error}</div>`);
  if(S.info) modal.insertAdjacentHTML('afterbegin',`<div class="succ">${S.info}</div>`);
}

// ── EDIT TOTAL CLASSES ────────────────────────────────────────────────
function editTotalClasses(uid){
  const users=getUsers(), idx=users.findIndex(u=>u.id===uid);
  const val=prompt(`Total classes per month for ${users[idx].studentName}:`, users[idx].totalClassesMonth);
  if(val===null) return;
  const n=parseInt(val);
  if(!n||n<1){ alert('Please enter a valid number.'); return; }
  users[idx].totalClassesMonth=n; saveUsers(users); render();
}

// ── MISC ─────────────────────────────────────────────────────────────
function setSection(s){ S.section=s; S.studentId=null; S.info=''; render(); }
function closeModals(){ S.approveModal=null; S.classModal=null; S.editClassId=null; S.editSchedUid=null; S.noteModal=null; S.settingsModal=false; S.error=''; S.info=''; render(); }
function doLogout(){ S.loggedIn=false; render(); }

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(icon, title, body, type='') {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const id = 'toast-' + Date.now();
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.id = id;
  el.innerHTML = `<div class="toast-icon">${icon}</div>
    <div class="toast-body"><strong>${title}</strong><p>${body}</p></div>
    <button class="toast-close" onclick="dismissToast('${id}')">✕</button>`;
  wrap.appendChild(el);
  setTimeout(() => dismissToast(id), 6000);
}

function dismissToast(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.animation = 'slideOut .3s ease forwards';
  setTimeout(() => el.remove(), 300);
}

// ── AUTO-REFRESH (localStorage polling) ──────────────────────────────
let lastKnownPendingCount = 0;

function checkForNewRequests() {
  if (!S.loggedIn) return;
  const pending = getUsers().filter(u => u.status === 'pending');
  if (pending.length > lastKnownPendingCount) {
    const newest = pending[pending.length - 1];
    showToast('🔔', 'New Sign-up Request!', `${newest.name} signed up for ${newest.studentName}`, 'new-request');
    // Auto-switch to pending tab if not in a student detail
    if (!S.studentId && !S.approveModal && !S.classModal && !S.noteModal) {
      S.section = 'pending';
      render();
    } else {
      // Just refresh the sidebar badge
      const badge = document.querySelector('.nav-badge');
      if (badge) badge.textContent = pending.length;
    }
  }
  lastKnownPendingCount = pending.length;
}

// Listen for localStorage changes from the parents app (same domain)
window.addEventListener('storage', (e) => {
  if (e.key === 'ml_users' && S.loggedIn) {
    checkForNewRequests();
  }
});

// Also poll every 10 seconds as fallback (same tab won't fire storage events)
setInterval(() => { if (S.loggedIn) checkForNewRequests(); }, 10000);

// Init
render();
</script>
